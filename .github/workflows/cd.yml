name: CD

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm_production:
        description: "Type deploy-production to allow manual production deploy"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  validate-dispatch:
    runs-on: ubuntu-latest
    outputs:
      confirmed: ${{ steps.validate.outputs.confirmed }}
    steps:
      - name: Validate manual production confirmation
        id: validate
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "confirmed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.inputs.environment }}" != "production" ]; then
            echo "confirmed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.inputs.confirm_production }}" = "deploy-production" ]; then
            echo "confirmed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Manual production deploy blocked. Set confirm_production to 'deploy-production' and re-run."
          echo "confirmed=false" >> "$GITHUB_OUTPUT"
          exit 1

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: validate-dispatch
    if: ${{ needs.validate-dispatch.outputs.confirmed == 'true' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    env:
      IMAGE_CHANNEL: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') || github.ref_name == 'main') && 'latest' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=${{ env.IMAGE_CHANNEL }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: ${{ needs.build-and-push-image.result == 'success' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') || github.ref_name == 'main') && secrets.DEPLOY_WEBHOOK_URL_PROD || secrets.DEPLOY_WEBHOOK_URL_STAGING }}

    steps:
      - name: Trigger deploy webhook
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "No deploy webhook configured for this branch. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
